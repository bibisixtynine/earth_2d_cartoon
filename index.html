<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terre cartoon depuis l’espace</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="scene" aria-label="La Terre vue de l’espace dans un univers étoilé">
    <div class="stars stars-back"></div>
    <div class="stars stars-mid"></div>
    <div class="stars stars-front"></div>

    <section class="earth-system" aria-hidden="true">
      <div class="earth-glow"></div>
      <div class="earth-shadow"></div>
      <div class="earth">
        <div class="continent c1"></div>
        <div class="continent c2"></div>
        <div class="continent c3"></div>
        <div class="continent c4"></div>
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
      </div>
    </section>

    <div class="sparkle s1"></div>
    <div class="sparkle s2"></div>
    <div class="sparkle s3"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
